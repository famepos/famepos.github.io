<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>สแกนบาร์โค้ด - FamePOS</title>
    
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 flex flex-col items-center justify-center h-screen m-0 overflow-hidden">
    
    <div class="w-full max-w-md p-4 flex flex-col items-center">
        <h2 class="text-white text-xl font-bold mb-4 flex items-center gap-2">
            <span class="animate-pulse">🔴</span> กำลังสแกนบาร์โค้ด...
        </h2>
        
        <div id="reader" class="w-full bg-black rounded-3xl overflow-hidden border-4 border-red-500 shadow-[0_0_20px_rgba(239,68,68,0.5)]"></div>
        
        <p class="text-gray-400 text-[11px] mt-6 text-center bg-gray-800 px-4 py-2 rounded-xl">
            พยายามให้บาร์โค้ดอยู่ตรงกลางกรอบสีเหลี่ยม<br>(รองรับ EAN-13, Code-128 และ QR Code)
        </p>

        <button onclick="window.close()" class="mt-8 bg-gray-700 hover:bg-gray-600 text-white px-8 py-3 rounded-2xl font-bold transition active:scale-95">
            ❌ ยกเลิก / ปิดหน้าต่าง
        </button>
    </div>

    <script>
        // 1. ฟังก์ชันเมื่อสแกนติด
        function onScanSuccess(decodedText, decodedResult) {
            // เล่นเสียงติ๊ง
            const beep = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');
            beep.play().catch(()=>console.log('Audio play blocked'));

            // ส่งรหัสกลับไปให้หน้า POS หลัก
            if (window.opener) {
                window.opener.postMessage({ type: 'BARCODE_SCANNED', code: decodedText }, '*');
            }
            
            // ปิดกล้องและปิดหน้าต่างทันที
            html5QrcodeScanner.clear();
            setTimeout(() => { window.close(); }, 300);
        }

        // 2. ฟังก์ชันเมื่อสแกนไม่เจอ (ปล่อยว่างไว้ ไม่ต้องให้มันแจ้งเตือนกวนใจ)
        function onScanFailure(error) {
            // ไม่ต้องทำอะไร
        }

        // 3. ตั้งค่าตัวสแกนให้เหมาะกับ EAN-13
        let html5QrcodeScanner = new Html5QrcodeScanner(
            "reader",
            { 
                fps: 15, 
                qrbox: { width: 250, height: 120 }, // 🌟 บีบกรอบสแกนให้เป็นแนวนอน จะช่วยให้อ่านบาร์โค้ดแท่งได้ดีขึ้น 300%
                aspectRatio: 1.0,
                formatsToSupport: [ 
                    Html5QrcodeSupportedFormats.EAN_13, // สำหรับบาร์โค้ดสินค้าทั่วไป (เช่น 885)
                    Html5QrcodeSupportedFormats.CODE_128, // สำหรับบาร์โค้ดพิมพ์เอง
                    Html5QrcodeSupportedFormats.QR_CODE 
                ]
            },
            false // ไม่โชว์ log กวนใจ
        );
        
        // 4. สั่งเริ่มเปิดกล้องทันที
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    </script>

    <style>
        #reader__dashboard_section_csr span { color: white !important; }
        #reader__dashboard_section_swaplink { color: #ef4444 !important; text-decoration: none !important; font-weight: bold; }
        #reader__camera_permission_button { background: #ef4444 !important; color: white !important; border: none !important; border-radius: 10px; padding: 10px 20px; font-weight: bold; }
        #reader__dashboard_section_csr select { padding: 5px; border-radius: 5px; }
        #reader a { display: none; }
    </style>
</body>
</html>
