<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer Display</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap');
    body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; overflow: hidden; }
    .animate-fade-in { animation: fadeIn 0.5s ease-in-out; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="h-screen w-screen flex flex-col">

  <div class="bg-white shadow-sm p-4 flex justify-between items-center z-10 border-b border-red-100">
    <div class="flex items-center gap-4">
      <img id="cfd-logo" src="https://i.postimg.cc/SxGCt9N2/logo.png" class="h-16 w-auto object-contain rounded-xl">
      <h1 id="cfd-shop-name" class="text-3xl font-bold text-gray-800">FamePOS</h1>
    </div>
    <div class="text-gray-400 font-bold text-xl" id="cfd-clock">00:00:00</div>
  </div>

  <div class="flex-1 flex overflow-hidden">
    
    <div class="w-2/3 h-full bg-white p-6 overflow-y-auto border-r border-gray-100 flex flex-col">
      <h2 class="text-2xl font-bold text-red-600 mb-6 border-b-2 border-red-100 pb-2">รายการสินค้าของคุณ</h2>
      
      <div id="cfd-idle-state" class="flex-1 flex flex-col items-center justify-center opacity-50">
        <span class="text-6xl mb-4">🛒</span>
        <h2 class="text-3xl font-bold text-gray-400">ยินดีต้อนรับ</h2>
        <p class="text-gray-400 text-lg mt-2">กำลังรอรับรายการสินค้า...</p>
      </div>

      <div id="cfd-cart-items" class="flex-1 space-y-4 hidden pb-10">
      </div>
    </div>

    <div class="w-1/3 h-full bg-gray-50 p-6 flex flex-col shadow-inner relative">
      
      <div class="bg-white p-6 rounded-3xl shadow-sm border border-red-100 mb-6">
        <div class="flex justify-between text-gray-500 mb-2 text-xl">
          <span>ยอดรวม</span><span id="cfd-subtotal">฿0.00</span>
        </div>
        <div class="flex justify-between text-red-500 mb-4 text-xl hidden" id="cfd-discount-row">
          <span>ส่วนลด</span><span id="cfd-discount">-฿0.00</span>
        </div>
        <div class="border-t-2 border-dashed border-gray-200 pt-4 mt-2">
          <p class="text-sm text-gray-400 uppercase font-bold tracking-widest mb-1">ยอดชำระสุทธิ</p>
          <div class="flex justify-between items-end">
            <span class="text-5xl font-bold text-red-600" id="cfd-net-total">฿0.00</span>
          </div>
        </div>
      </div>

      <div id="cfd-payment-area" class="flex-1 bg-white rounded-3xl shadow-sm border border-gray-100 p-6 flex flex-col items-center justify-center hidden animate-fade-in">
        
        <div id="cfd-pay-cash" class="w-full text-center hidden">
          <div class="text-6xl mb-4">💵</div>
          <h3 class="text-2xl font-bold text-gray-700 mb-6">ชำระด้วยเงินสด</h3>
          <div class="bg-gray-50 p-4 rounded-2xl mb-4 flex justify-between items-center">
            <span class="text-gray-500 text-xl font-bold">รับเงินมา</span>
            <span class="text-3xl font-bold text-gray-800" id="cfd-received">฿0.00</span>
          </div>
          <div class="bg-green-50 border border-green-200 p-4 rounded-2xl flex justify-between items-center">
            <span class="text-green-600 text-xl font-bold">เงินทอน</span>
            <span class="text-4xl font-bold text-green-600" id="cfd-change">฿0.00</span>
          </div>
        </div>

        <div id="cfd-pay-qr" class="w-full text-center hidden flex flex-col items-center">
          <h3 class="text-2xl font-bold text-gray-700 mb-2">สแกนชำระเงิน (พร้อมเพย์)</h3>
          <p class="text-gray-400 mb-6">กรุณาสแกน QR Code ด้านล่าง</p>
          <div class="bg-white p-4 rounded-3xl border-4 border-red-50 shadow-lg">
            <img id="cfd-qr-img" src="" class="w-64 h-64 object-contain">
          </div>
        </div>

      </div>

      <div id="cfd-success" class="absolute inset-0 bg-green-500 rounded-l-3xl flex flex-col items-center justify-center text-white hidden animate-fade-in z-50">
        <div class="text-8xl mb-6 bg-white rounded-full p-4">✅</div>
        <h2 class="text-4xl font-bold mb-2">ชำระเงินเรียบร้อย</h2>
        <p class="text-xl opacity-90">ขอบคุณที่ใช้บริการครับ/ค่ะ</p>
      </div>

    </div>
  </div>

  <script>
    // อัปเดตนาฬิกา
    setInterval(() => {
      document.getElementById('cfd-clock').innerText = new Date().toLocaleTimeString('th-TH');
    }, 1000);

    // 🌟 ใส่ลิงก์ Web App Google Script ของคุณตรงนี้! (อันที่ลงท้ายด้วย /exec)
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxqmIYIYrhEeAMvxFlDY3K4c0iRSXaUxFNrn-TUmouG-nRnmGyvDPocbsK4MGDVz_ZEBQ/exec";

    // ฟังก์ชันวิ่งไปดึงข้อมูลจาก Server
// ฟังก์ชันวิ่งไปดึงข้อมูลจาก Server (อัปเดตแก้ปัญหา Cache)
    async function fetchCFDState() {
      try {
        // เพิ่มเวลา (Timestamp) ต่อท้ายลิงก์ เพื่อหลอกเบราว์เซอร์ว่าเป็นลิงก์ใหม่เสมอ (Cache Busting)
        const timestamp = new Date().getTime();
        const fetchUrl = `${GAS_URL}?api=getCFD&t=${timestamp}`;

        const response = await fetch(fetchUrl, { cache: 'no-store' }); // บังคับไม่ให้จำค่า
        const data = await response.json();
        
        if (data) {
          // สั่งให้วาดหน้าจอใหม่
          renderCFD(data);
        }
      } catch (error) {
        console.error("กำลังเชื่อมต่อข้อมูล...", error);
      }
    }

    // สั่งให้ดึงข้อมูลใหม่ทุกๆ 2 วินาที
    setInterval(fetchCFDState, 2000);
    window.onload = fetchCFDState;

    // ฟังก์ชันวาดหน้าจอ (ใช้ของเดิมที่คุณมีได้เลยครับ)
    function renderCFD(data) {
      // 1. อัปเดตข้อมูลร้าน
      document.getElementById('cfd-logo').src = data.shopLogo;
      document.getElementById('cfd-shop-name').innerText = data.shopName;

      // Element References
      const idleState = document.getElementById('cfd-idle-state');
      const cartItems = document.getElementById('cfd-cart-items');
      const paymentArea = document.getElementById('cfd-payment-area');
      const payCash = document.getElementById('cfd-pay-cash');
      const payQR = document.getElementById('cfd-pay-qr');
      const successScreen = document.getElementById('cfd-success');

      // 2. จัดการสถานะ (Idle / Success)
      if (data.status === 'completed') {
        successScreen.classList.remove('hidden');
        setTimeout(() => { successScreen.classList.add('hidden'); }, 4000);
        return;
      } else {
        successScreen.classList.add('hidden');
      }

      if (data.cart.length === 0 || data.status === 'idle') {
        idleState.classList.remove('hidden');
        cartItems.classList.add('hidden');
        paymentArea.classList.add('hidden');
        document.getElementById('cfd-subtotal').innerText = '฿0.00';
        document.getElementById('cfd-net-total').innerText = '฿0.00';
        document.getElementById('cfd-discount-row').classList.add('hidden');
        return;
      }

      // 3. แสดงตะกร้าสินค้า
      idleState.classList.add('hidden');
      cartItems.classList.remove('hidden');
      cartItems.innerHTML = data.cart.map(item => {
        let optionsHtml = '';
        if (item.options) {
          const optsArray = typeof item.options === 'object' ? Object.values(item.options) : [item.options];
          if (optsArray.length > 0 && optsArray[0] !== "") {
            optionsHtml = `<div class="text-sm text-gray-500">${optsArray.join(', ')}</div>`;
          }
        }
        return `
        <div class="flex justify-between items-center bg-gray-50 p-4 rounded-2xl border border-gray-100">
          <div class="flex items-center gap-4">
            <div class="bg-red-100 text-red-600 font-bold w-10 h-10 rounded-full flex items-center justify-center text-lg">${item.qty}</div>
            <div>
              <div class="text-xl font-bold text-gray-800">${item.name}</div>
              ${optionsHtml}
            </div>
          </div>
          <div class="text-xl font-bold text-red-600">฿${(item.price * item.qty).toFixed(2)}</div>
        </div>`;
      }).join('');

      cartItems.scrollTop = cartItems.scrollHeight;

      // 4. แสดงยอดเงิน
      document.getElementById('cfd-subtotal').innerText = `฿${data.grandTotal.toFixed(2)}`;
      document.getElementById('cfd-net-total').innerText = `฿${data.netTotal.toFixed(2)}`;
      
      if (data.discount > 0) {
        document.getElementById('cfd-discount-row').classList.remove('hidden');
        document.getElementById('cfd-discount').innerText = `-฿${data.discount.toFixed(2)}`;
      } else {
        document.getElementById('cfd-discount-row').classList.add('hidden');
      }

      // 5. แสดงสถานะการจ่ายเงิน
      if (data.status === 'paying') {
        paymentArea.classList.remove('hidden');
        
        if (data.method === 'เงินสด' || data.method.includes('เงินสด')) {
          payCash.classList.remove('hidden');
          payQR.classList.add('hidden');
          document.getElementById('cfd-received').innerText = `฿${data.received.toFixed(2)}`;
          document.getElementById('cfd-change').innerText = `฿${data.change.toFixed(2)}`;
        } 
        else if (data.method === 'สแกนจ่าย' && data.qrSrc) {
          payCash.classList.add('hidden');
          payQR.classList.remove('hidden');
          document.getElementById('cfd-qr-img').src = data.qrSrc;
        } 
        else {
           payCash.classList.add('hidden');
           payQR.classList.add('hidden');
        }
      } else {
        paymentArea.classList.add('hidden');
      }
    }
  </script>
</body>
</html>
