<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  
  <link rel="icon" type="image/png" href="https://i.postimg.cc/9MzT6RTZ/20-(5).png">
  <link rel="apple-touch-icon" href="https://i.postimg.cc/9MzT6RTZ/20-(5).png">

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="FamePOS">

  <title>Customer Display - FamePOS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap');
    body { font-family: 'Sarabun', sans-serif; background-color: #ffffff; overflow: hidden; }
    
    .animate-fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

    .custom-scrollbar::-webkit-scrollbar { width: 4px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #fee2e2; border-radius: 10px; }
  </style>
</head>
<body class="h-screen w-screen flex flex-col overflow-hidden">

  <div id="cfd-screensaver" class="fixed inset-0 bg-black z-[200] flex items-center justify-center hidden">
    <img id="screensaver-img" src="" class="w-full h-full object-contain transition-opacity duration-1000 opacity-0">
  </div>

  <div id="full-payment-overlay" class="fixed inset-0 bg-white z-[150] flex flex-col items-center justify-center p-6 hidden animate-fade-in">
      <div id="full-pay-qr" class="w-full flex flex-col items-center hidden">
          <h2 class="text-2xl font-bold text-gray-500 mb-2">สแกนชำระเงิน</h2>
          <div class="text-6xl font-black text-red-600 mb-8 leading-none">฿<span id="full-qr-amount">0.00</span></div>
          <div class="bg-white p-4 rounded-[2.5rem] border-[12px] border-red-50 shadow-2xl">
              <img id="full-qr-img" src="" class="w-72 h-72 md:w-96 md:h-96 object-contain">
          </div>
          <p class="text-gray-400 mt-8 font-bold animate-pulse text-lg">ขอบคุณที่ใช้บริการครับ/ค่ะ</p>
      </div>

      <div id="full-pay-cash" class="w-full flex flex-col items-center hidden">
          <div class="text-8xl mb-6">💵</div>
          <h2 class="text-3xl font-bold text-gray-700 mb-10">ชำระเงินสด</h2>
          <div class="w-full max-w-sm space-y-6">
              <div class="flex justify-between items-center text-2xl text-gray-400 font-bold uppercase">
                  <span>รับเงินมา</span><span class="text-gray-800" id="full-received">฿0.00</span>
              </div>
              <div class="bg-green-500 text-white p-8 rounded-[2rem] shadow-xl text-center">
                  <p class="text-sm font-bold uppercase tracking-widest mb-2 opacity-80">เงินทอนที่ได้รับ</p>
                  <p class="text-7xl font-black leading-none" id="full-change">฿0.00</p>
              </div>
          </div>
      </div>
  </div>

  <div id="standard-layout" class="h-full flex flex-col">
      <header class="flex-shrink-0 bg-white p-4 flex justify-between items-center border-b border-red-100">
        <div class="flex items-center gap-3">
          <img id="cfd-logo" src="https://i.postimg.cc/SxGCt9N2/logo.png" class="h-10 w-auto object-contain">
          <h1 id="cfd-shop-name" class="text-xl font-bold text-gray-800">FamePOS</h1>
        </div>
        <div class="text-red-500 font-bold text-xl font-mono" id="cfd-clock">00:00:00</div>
      </header>

      <main class="flex-1 flex flex-col lg:flex-row overflow-hidden">
        <section class="flex-1 flex flex-col bg-white overflow-hidden lg:border-r border-gray-100">
          <div class="p-4 border-b border-gray-50"><h2 class="font-bold text-red-600">🛒 รายการสินค้าของคุณ</h2></div>
          <div id="cfd-cart-items" class="flex-1 overflow-y-auto p-4 space-y-3 custom-scrollbar hidden"></div>
          <div id="cfd-idle-state" class="flex-1 flex flex-col items-center justify-center opacity-30"><div class="text-6xl mb-4">🛍️</div><h2 class="text-xl font-bold">ยินดีต้อนรับ</h2></div>
        </section>

        <aside class="w-full lg:w-[350px] bg-gray-50 p-4 border-t lg:border-t-0 shadow-inner">
            <div class="bg-white p-4 rounded-2xl border border-red-100">
              <div class="flex justify-between text-gray-400 text-sm font-bold uppercase"><span>ยอดรวม</span><span id="cfd-subtotal">฿0.00</span></div>
              <div id="cfd-discount-row" class="flex justify-between text-red-400 text-sm font-bold hidden"><span>ส่วนลด</span><span id="cfd-discount">-฿0.00</span></div>
              <div class="border-t-2 border-dashed border-gray-100 pt-3 mt-2">
                <p class="text-[10px] text-gray-400 font-black uppercase mb-1">ยอดสุทธิ</p>
                <span class="text-5xl font-black text-red-600 leading-none" id="cfd-net-total">฿0.00</span>
              </div>
            </div>
        </aside>
      </main>
  </div>

  <div id="cfd-success" class="fixed inset-0 bg-black/60 backdrop-blur-md flex items-center justify-center hidden animate-fade-in z-[300]">
    <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl flex flex-col items-center border-[10px] border-green-400 max-w-[90%] text-center">
      <div class="text-7xl mb-4">✅</div>
      <h2 class="text-3xl font-black text-green-600">ชำระเงินเรียบร้อย</h2>
      <p class="text-lg text-gray-400 mt-2">ขอบคุณที่ใช้บริการค่ะ/ครับ</p>
    </div>
  </div>

  <script>
    /* 🌟 JavaScript ชุดแก้ไขสำหรับการสลับโหมดเต็มหน้าจอ 🌟 */
    setInterval(() => { document.getElementById('cfd-clock').innerText = new Date().toLocaleTimeString('th-TH'); }, 1000);
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxqmIYIYrhEeAMvxFlDY3K4c0iRSXaUxFNrn-TUmouG-nRnmGyvDPocbsK4MGDVz_ZEBQ/exec";
    let lastDataJson = ""; let idleTimeout = null; let slideTimer = null; let currentSlideIndex = 0; let activeAds = [];

    async function fetchCFDState() {
      try {
        const timestamp = new Date().getTime();
        const response = await fetch(`${GAS_URL}?api=getCFD&t=${timestamp}`, { cache: 'no-store' });
        const data = await response.json();
        if (data) {
            handleScreensaverLogic(data);
            const currentDataJson = JSON.stringify(data);
            if (currentDataJson !== lastDataJson) { lastDataJson = currentDataJson; renderCFD(data); }
        }
      } catch (error) { console.error("Error", error); }
    }
    setInterval(fetchCFDState, 1000); window.onload = fetchCFDState;

    function renderCFD(data) {
  const standardLayout = document.getElementById('standard-layout');
  const fullPayment = document.getElementById('full-payment-overlay');
  const successScreen = document.getElementById('cfd-success');

  // 🖼️ ตั้งค่าโฆษณา
  if (data.adsList) activeAds = data.adsList.filter(ad => ad.enabled === true || ad.enabled === "TRUE");

  // 1. จัดการหน้าจอความสำเร็จ
  if (data.status === 'completed') {
    successScreen.classList.remove('hidden');
    fullPayment.classList.add('hidden');
    setTimeout(() => { successScreen.classList.add('hidden'); }, 4000);
    return;
  }

  // 💳 2. จัดการโหมดชำระเงินเต็มหน้าจอ (status === 'paying')
  if (data.status === 'paying') {
      standardLayout.classList.add('hidden');
      fullPayment.classList.remove('hidden');
      
      const fullCash = document.getElementById('full-pay-cash');
      const fullQR = document.getElementById('full-pay-qr');

      // 🌟 กรณีที่ 1: เดลิเวอรี่ -> แสดงแค่ชื่อ ไม่โชว์ยอดเงิน/QR
      if (data.method === 'เดลิเวอรี่' || (data.tableNo && isNaN(data.tableNo))) {
          fullQR.classList.add('hidden');
          fullCash.classList.remove('hidden');
          
          // เปลี่ยนเนื้อหาในส่วน Cash มาแสดงเป็นไอคอนเดลิเวอรี่แทน
          fullCash.innerHTML = `
              <div class="text-8xl mb-6">🛵</div>
              <h2 class="text-4xl font-bold text-orange-500 mb-4">${data.tableNo || 'เดลิเวอรี่'}</h2>
              <p class="text-2xl text-gray-400">กรุณารอรับอาหารสักครู่ครับ/ค่ะ</p>
          `;
      } 
      // 🌟 กรณีที่ 2: สแกนจ่าย / คนละครึ่ง -> สร้าง QR ด้วยยอดคงเหลือ (remaining)
      else if (data.method.includes('สแกนจ่าย') || data.method === 'คนละครึ่ง' || data.method.includes('+')) {
          fullCash.classList.add('hidden');
          fullQR.classList.remove('hidden');
          
          // ดึงยอด remaining มาใช้ ถ้าไม่มีให้ใช้ netTotal
          const qrAmount = data.remaining || data.netTotal;
          document.getElementById('full-qr-amount').innerText = qrAmount.toFixed(2);
          
          if (data.ppNo) {
              document.getElementById('full-qr-img').src = `https://promptpay.io/${data.ppNo}/${qrAmount.toFixed(2)}.png`;
          }
      } 
      // 🌟 กรณีที่ 3: เงินสดปกติ
      else {
          fullQR.classList.add('hidden');
          fullCash.classList.remove('hidden');
          // คืนค่ารูปแบบเงินสดเดิม
          fullCash.innerHTML = `
              <div class="text-8xl mb-6">💵</div>
              <h2 class="text-3xl font-bold text-gray-700 mb-10">ชำระเงินสด</h2>
              <div class="w-full max-w-sm space-y-6">
                  <div class="flex justify-between items-center text-2xl text-gray-400 font-bold uppercase">
                      <span>รับเงินมา</span><span class="text-gray-800">฿${data.received.toFixed(2)}</span>
                  </div>
                  <div class="bg-green-500 text-white p-8 rounded-[2rem] shadow-xl text-center">
                      <p class="text-sm font-bold uppercase tracking-widest mb-2 opacity-80">เงินทอนที่ได้รับ</p>
                      <p class="text-7xl font-black leading-none">฿${data.change.toFixed(2)}</p>
                  </div>
              </div>
          `;
      }
      return; // จบการทำงานในโหมดจ่ายเงิน
  } else {
      // โหมดปกติ: โชว์รายการสินค้า
      fullPayment.classList.add('hidden');
      standardLayout.classList.remove('hidden');
  }

  // 3. วาดรายการสินค้าในโหมดปกติ
  const idleState = document.getElementById('cfd-idle-state');
  const cartItems = document.getElementById('cfd-cart-items');
  if (!data.cart || data.cart.length === 0) {
      idleState.classList.remove('hidden'); cartItems.classList.add('hidden');
      document.getElementById('cfd-subtotal').innerText = '฿0.00'; document.getElementById('cfd-net-total').innerText = '฿0.00';
      document.getElementById('cfd-discount-row').classList.add('hidden');
  } else {
      idleState.classList.add('hidden'); cartItems.classList.remove('hidden');
      cartItems.innerHTML = data.cart.map(item => {
        let opts = item.options ? `<div class="text-[10px] text-gray-400 italic">${Object.values(item.options).join(', ')}</div>` : '';
        return `<div class="flex justify-between items-center bg-gray-50 p-4 rounded-2xl mb-2"><div class="flex items-center gap-3"><div class="bg-red-600 text-white font-black w-8 h-8 rounded-full flex items-center justify-center text-sm">${item.qty}</div><div><div class="font-bold text-gray-800">${item.name}</div>${opts}</div></div><div class="font-black text-red-600">฿${(item.price * item.qty).toFixed(2)}</div></div>`;
      }).join('');
      document.getElementById('cfd-subtotal').innerText = `฿${data.grandTotal.toFixed(2)}`;
      document.getElementById('cfd-net-total').innerText = `฿${data.netTotal.toFixed(2)}`;
      if (data.discount > 0) {
          document.getElementById('cfd-discount-row').classList.remove('hidden');
          document.getElementById('cfd-discount').innerText = `-฿${data.discount.toFixed(2)}`;
      } else { document.getElementById('cfd-discount-row').classList.add('hidden'); }
  }
}

    // 📺 ระบบพักหน้าจอ
    function handleScreensaverLogic(data) {
        const screensaver = document.getElementById('cfd-screensaver');
        const isAdShowing = screensaver && !screensaver.classList.contains('hidden');
        if ((data.cart && data.cart.length > 0) || data.status === 'paying' || !document.getElementById('cfd-success').classList.contains('hidden')) {
            stopScreensaver(); if (idleTimeout) { clearTimeout(idleTimeout); idleTimeout = null; } return;
        }
        if (!isAdShowing && !idleTimeout && activeAds.length > 0) { idleTimeout = setTimeout(() => { idleTimeout = null; startScreensaver(); }, 1000); }
    }
    function startScreensaver() { document.getElementById('cfd-screensaver').classList.remove('hidden'); currentSlideIndex = 0; showNextSlide(); }
    function showNextSlide() {
        const img = document.getElementById('screensaver-img'); if (activeAds.length === 0) { stopScreensaver(); return; }
        const ad = activeAds[currentSlideIndex]; img.src = ad.url; img.style.opacity = 1;
        clearTimeout(slideTimer);
        slideTimer = setTimeout(() => { img.style.opacity = 0; setTimeout(() => { currentSlideIndex = (currentSlideIndex + 1) % activeAds.length; showNextSlide(); }, 500); }, (ad.duration || 5) * 1000);
    }
    function stopScreensaver() { clearTimeout(slideTimer); const ss = document.getElementById('cfd-screensaver'); if (ss) ss.classList.add('hidden'); }
  </script>
</body>
</html>
