<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Customer Display - FamePOS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', sans-serif; background-color: #f8fafc; }
    .cart-item-row { border-bottom: 1px solid #e2e8f0; animation: fadeIn 0.3s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">
  <div class="flex h-full">
    <div class="w-2/3 bg-white shadow-xl flex flex-col">
      <header class="bg-red-600 text-white p-6 shadow-md flex justify-between items-center">
        <h1 class="text-3xl font-bold">รายการสั่งซื้อ</h1>
        <div id="connection-status" class="text-sm font-bold bg-green-500 px-3 py-1 rounded-full animate-pulse">
            รอการเชื่อมต่อ...
        </div>
      </header>
      <div id="cart-list" class="flex-1 overflow-y-auto p-6 space-y-4">
        <div class="text-center py-20 text-gray-400">
           <p class="text-5xl mb-4">🛒</p>
           <p class="text-xl">ยินดีต้อนรับครับ/ค่ะ</p>
        </div>
      </div>
    </div>

    <div class="w-1/3 bg-red-50 p-8 flex flex-col justify-between border-l-4 border-red-200">
      <div class="text-center">
        <img id="shop-logo" src="https://i.postimg.cc/SxGCt9N2/logo.png" class="h-32 mx-auto mb-4 rounded-3xl shadow-sm">
        <h2 id="shop-name" class="text-2xl font-bold text-gray-800">FamePOS</h2>
      </div>

      <div class="bg-white p-6 rounded-3xl shadow-inner border-2 border-red-100">
        <p class="text-gray-400 font-bold uppercase text-sm mb-1">ยอดสุทธิที่ต้องชำระ</p>
        <p id="total-amount" class="text-6xl font-black text-red-600">฿0.00</p>
      </div>

      <div id="qr-area" class="hidden text-center bg-white p-4 rounded-3xl shadow-md animate-bounce">
        <img id="qr-img" src="" class="w-48 h-48 mx-auto">
        <p class="text-sm font-bold text-red-700 mt-2">สแกนชำระเงินที่นี่</p>
      </div>
      
      <div class="text-center text-gray-400 text-xs italic">
        ขอบคุณที่ใช้บริการ
      </div>
    </div>
  </div>

  <script>
    const connectionStatus = document.getElementById('connection-status');

    // 🌟 รับข้อมูลจากหน้าแคชเชียร์ (Google Apps Script) แบบข้ามโดเมน
    window.addEventListener('message', function(event) {
      
      // เปลี่ยนป้ายสถานะว่าเชื่อมต่อสำเร็จแล้ว
      connectionStatus.innerText = "เชื่อมต่อแล้ว";
      connectionStatus.classList.remove('bg-gray-400', 'animate-pulse');
      connectionStatus.classList.add('bg-green-500');

      const data = event.data;

      if (data.type === 'UPDATE_CART') {
        renderCart(data.cart, data.total);
        
        // จัดการโชว์/ซ่อน QR Code
        if (data.qrUrl) {
          document.getElementById('qr-img').src = data.qrUrl;
          document.getElementById('qr-area').classList.remove('hidden');
        } else {
          document.getElementById('qr-area').classList.add('hidden');
        }
        
      } else if (data.type === 'CLEAR') {
        // กลับไปเป็นหน้าต้อนรับ
        renderCart([], 0);
        document.getElementById('qr-area').classList.add('hidden');
        
        // เคลียร์ป้ายสถานะกลับเป็นรอรับออเดอร์ใหม่
        setTimeout(() => {
          connectionStatus.innerText = "พร้อมรับรายการ";
          connectionStatus.classList.remove('bg-green-500');
          connectionStatus.classList.add('bg-gray-400', 'animate-pulse');
        }, 3000);
      }
    });

    // ฟังก์ชันวาดตะกร้าบนหน้าจอ
    function renderCart(cart, total) {
      const list = document.getElementById('cart-list');
      document.getElementById('total-amount').innerText = '฿' + (total || 0).toFixed(2);
      
      if (!cart || cart.length === 0) {
        list.innerHTML = '<div class="text-center py-20 text-gray-400"><p class="text-5xl mb-4">🛒</p><p class="text-xl">ยินดีต้อนรับครับ/ค่ะ</p></div>';
        return;
      }

      list.innerHTML = cart.map(item => `
        <div class="cart-item-row py-4 flex justify-between items-start">
          <div>
            <div class="text-xl font-bold text-gray-800">${item.name}</div>
            <div class="text-sm text-gray-400">${Object.values(item.options || {}).join(', ')}</div>
          </div>
          <div class="text-right">
            <div class="text-lg font-bold text-gray-800">x${item.qty}</div>
            <div class="text-xl font-bold text-red-500">฿${(item.price * item.qty).toFixed(2)}</div>
          </div>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
