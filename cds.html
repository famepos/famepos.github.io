<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Display - FamePOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #fce4e4; }
        .animate-pulse-slow { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        .animate-fadeIn { animation: fadeIn 0.4s ease-out; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .7; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div class="flex flex-1 overflow-hidden">
        <div class="w-7/12 bg-white shadow-2xl flex flex-col p-8 z-10 relative">
            <div class="flex items-center gap-4 mb-6 border-b-2 pb-4 border-red-50 flex-shrink-0">
                <img src="https://i.postimg.cc/SxGCt9N2/logo.png" class="h-16 w-auto rounded-xl">
                <div>
                    <h1 id="shop-name" class="text-3xl font-bold text-red-600">FAME POS</h1>
                    <p class="text-gray-400 font-bold uppercase tracking-widest text-sm">รายการสินค้าของคุณ</p>
                </div>
            </div>

            <div id="cart-list" class="flex-1 overflow-y-auto pr-4 custom-scrollbar">
                <div class="h-full flex items-center justify-center text-gray-300 italic text-2xl font-bold">รอพนักงานเพิ่มรายการสินค้า...</div>
            </div>
        </div>

        <div class="w-5/12 flex flex-col p-6 gap-6 bg-red-50/30" id="cds-right-panel">
            </div>
    </div>

    <script>
        // 🌟 ใส่ลิงก์ Web App ของคุณตรงนี้
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxqmIYIYrhEeAMvxFlDY3K4c0iRSXaUxFNrn-TUmouG-nRnmGyvDPocbsK4MGDVz_ZEBQ/exec";
        
        let lastStateStr = "";

        function pollUpdate() {
            fetch(`${GAS_URL}?api=getCDS&_=${new Date().getTime()}`)
                .then(res => res.json())
                .then(data => {
                    // ป้องกันหน้าจอกระพริบ (อัปเดตเฉพาะตอนข้อมูลเปลี่ยน)
                    const currentStateStr = JSON.stringify(data);
                    if (currentStateStr !== lastStateStr) {
                        updateUI(data);
                        lastStateStr = currentStateStr;
                    }
                })
                .catch(err => console.log("Poll waiting..."));
        }

        function updateUI(data) {
            const list = document.getElementById('cart-list');
            const rightPanel = document.getElementById('cds-right-panel');
            
            document.getElementById('shop-name').innerText = data.shopName || "FAME POS";

            // 1. อัปเดตรายการสินค้าฝั่งซ้าย
            if (!data.cart || data.cart.length === 0) {
                list.innerHTML = `<div class="h-full flex items-center justify-center text-gray-300 italic text-2xl font-bold animate-pulse">ยินดีต้อนรับ เชิญสั่งอาหารได้เลยค่ะ</div>`;
            } else {
                list.innerHTML = data.cart.map(item => `
                    <div class="flex justify-between items-center bg-white p-5 rounded-2xl border-2 border-red-50 shadow-sm mb-3">
                        <div class="flex-1">
                            <div class="text-2xl font-bold text-gray-800">${item.name}</div>
                            <div class="text-sm text-gray-400 font-bold mt-1">${Object.values(item.options||{}).join(', ')}</div>
                        </div>
                        <div class="text-right flex items-center gap-4">
                            <div class="text-xl font-bold text-red-500 bg-red-50 px-3 py-1 rounded-lg">x${item.qty}</div>
                            <div class="text-2xl font-black text-gray-700 w-24">฿${(item.price * item.qty).toFixed(2)}</div>
                        </div>
                    </div>
                `).join('');
                
                // เลื่อนลงล่างสุดอัตโนมัติ
                list.scrollTop = list.scrollHeight;
            }

            // 2. อัปเดตหน้าจอฝั่งขวาตามสถานะ (Status)
            let rightHTML = '';

            if (data.status === 'success') {
                // 🟢 สถานะ: จ่ายเงินสำเร็จ (โชว์เงินทอน)
                rightHTML = `
                    <div class="flex-1 bg-green-50 rounded-[40px] shadow-xl flex flex-col items-center justify-center p-8 border-4 border-green-200 animate-fadeIn">
                        <div class="text-7xl mb-4 animate-bounce">✅</div>
                        <h2 class="text-4xl font-black text-green-600 mb-2">ทำรายการสำเร็จ</h2>
                        <p class="text-xl font-bold text-gray-500 mb-8">คิวของคุณคือ: <span class="text-red-500 text-4xl ml-2 bg-white px-4 py-1 rounded-xl shadow-sm border">#${data.queueNo || '-'}</span></p>

                        <div class="w-full bg-white p-6 rounded-3xl shadow-sm text-center border-2 border-green-100">
                            <div class="flex justify-between items-center mb-4 border-b pb-4">
                                <p class="text-gray-400 font-bold uppercase">รับเงินมา</p>
                                <p class="text-3xl font-bold text-gray-800">฿${data.received || '0.00'}</p>
                            </div>
                            <div class="flex justify-between items-center mt-2">
                                <p class="text-red-400 font-black uppercase text-xl">เงินทอน</p>
                                <p class="text-5xl font-black text-green-500">฿${data.change || '0.00'}</p>
                            </div>
                        </div>
                    </div>
                `;
            } else if (data.status === 'paying') {
                // 🟠 สถานะ: กำลังหน้าจอชำระเงิน
                if (data.paymentMethod === 'สแกนจ่าย' && data.qrUrl) {
                    // โชว์ QR Code
                    rightHTML = `
                        <div class="bg-red-600 text-white p-8 rounded-[40px] shadow-lg flex flex-col items-center justify-center">
                            <p class="text-lg font-bold opacity-80 uppercase mb-1 tracking-widest">ยอดที่ต้องชำระ</p>
                            <h2 class="text-6xl font-black">฿${data.finalAmount || '0.00'}</h2>
                        </div>
                        <div class="flex-1 bg-white rounded-[40px] shadow-xl flex flex-col items-center justify-center p-8 border-4 border-red-100 animate-fadeIn">
                            <img src="https://promptpay.io/assets/images/promptpay-logo.png" class="h-8 mb-6">
                            <div class="p-4 border-4 border-red-50 rounded-3xl shadow-inner bg-white mb-6">
                                <img src="${data.qrUrl}" class="w-64 h-64 object-contain">
                            </div>
                            <p class="text-red-500 font-bold text-2xl animate-pulse">สแกนเพื่อชำระเงิน</p>
                        </div>
                    `;
                } else {
                    // โชว์ยอดเงินรับ/เงินทอนสด
                    rightHTML = `
                        <div class="bg-red-600 text-white p-8 rounded-[40px] shadow-lg flex flex-col items-center justify-center">
                            <p class="text-lg font-bold opacity-80 uppercase mb-1 tracking-widest">ยอดที่ต้องชำระ</p>
                            <h2 class="text-6xl font-black">฿${data.finalAmount || '0.00'}</h2>
                        </div>
                        <div class="flex-1 bg-white rounded-[40px] shadow-xl flex flex-col p-8 border-4 border-red-100 animate-fadeIn justify-center">
                            <div class="text-center mb-8 border-b-2 pb-6 border-gray-100">
                                <h3 class="text-2xl font-bold text-gray-500 uppercase tracking-widest">ชำระด้วย: <span class="text-red-500">${data.paymentMethod}</span></h3>
                            </div>
                            <div class="bg-gray-50 p-6 rounded-3xl border mb-4 flex justify-between items-center">
                                <p class="text-gray-400 font-bold uppercase text-lg">รับเงินมา</p>
                                <p class="text-4xl font-black text-gray-800">฿${data.received || '0.00'}</p>
                            </div>
                            <div class="bg-red-50 p-6 rounded-3xl border border-red-100 flex justify-between items-center">
                                <p class="text-red-400 font-black uppercase text-xl">เงินทอน</p>
                                <p class="text-5xl font-black text-red-600">฿${data.change || '0.00'}</p>
                            </div>
                        </div>
                    `;
                }
            } else {
                // 🔵 สถานะ: กำลังเลือกสินค้า (ปกติ)
                rightHTML = `
                    <div class="bg-red-600 text-white p-10 rounded-[40px] shadow-xl flex flex-col items-center justify-center border-4 border-red-700">
                        <p class="text-xl font-bold opacity-80 uppercase mb-2 tracking-widest">ยอดรวมขณะนี้</p>
                        <h2 class="text-7xl font-black text-shadow">${data.total || '฿0.00'}</h2>
                    </div>

                    <div class="flex-1 bg-white rounded-[40px] shadow-xl overflow-hidden flex flex-col items-center justify-center p-6 border-4 border-white">
                        <img src="https://i.postimg.cc/SxGCt9N2/logo.png" class="w-56 h-56 object-contain animate-pulse-slow mb-6 drop-shadow-xl">
                        <p class="text-red-400 font-black text-center text-2xl uppercase tracking-wider">รวดเร็ว แม่นยำ<br><span class="text-gray-400">บริการด้วยใจ</span></p>
                    </div>
                `;
            }
            
            rightPanel.innerHTML = rightHTML;
        }

        // ดึงข้อมูลใหม่ทุกๆ 1.5 วินาที
        setInterval(pollUpdate, 1500);
    </script>
</body>
</html>
