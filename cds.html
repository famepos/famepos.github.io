<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Display - FamePOS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #fce4e4; }
        .animate-pulse-slow { animation: pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .7; } }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">

    <div class="flex flex-1 overflow-hidden">
        <div class="w-2/3 bg-white shadow-2xl flex flex-col p-8">
            <div class="flex items-center gap-4 mb-8 border-b-2 pb-4 border-red-50">
                <img src="https://i.postimg.cc/SxGCt9N2/logo.png" class="h-16 w-auto rounded-xl">
                <div>
                    <h1 id="shop-name" class="text-3xl font-bold text-red-600">FAME POS</h1>
                    <p class="text-gray-400 font-bold uppercase tracking-widest text-sm">ยินดีต้อนรับคุณลูกค้าค่ะ</p>
                </div>
            </div>

            <div id="cart-list" class="flex-1 overflow-y-auto space-y-4 pr-4">
                <div class="h-full flex items-center justify-center text-gray-300 italic text-xl">
                    ไม่มีรายการสินค้าในขณะนี้
                </div>
            </div>
        </div>

        <div class="w-1/3 flex flex-col p-8 gap-6">
            <div class="bg-red-600 text-white p-10 rounded-[40px] shadow-2xl flex flex-col items-center justify-center">
                <p class="text-xl font-bold opacity-80 uppercase mb-2">ยอดชำระทั้งหมด</p>
                <h2 id="grand-total" class="text-7xl font-black">฿0.00</h2>
            </div>

            <div class="flex-1 bg-white rounded-[40px] shadow-lg overflow-hidden flex flex-col items-center justify-center p-6 border-4 border-white">
                <img src="https://i.postimg.cc/SxGCt9N2/logo.png" class="w-48 h-48 object-contain animate-pulse-slow mb-4">
                <p class="text-red-400 font-bold text-center">FamePOS<br>รวดเร็ว แม่นยำ บริการด้วยใจ</p>
            </div>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbxqmIYIYrhEeAMvxFlDY3K4c0iRSXaUxFNrn-TUmouG-nRnmGyvDPocbsK4MGDVz_ZEBQ/exec";

        function pollUpdate() {
            fetch(`${GAS_URL}?api=getCDS&_=${new Date().getTime()}`)
                .then(res => res.json())
                .then(data => {
                    updateUI(data);
                })
                .catch(err => console.log("Poll error"));
        }

        function updateUI(data) {
            const list = document.getElementById('cart-list');
            const total = document.getElementById('grand-total');
            document.getElementById('shop-name').innerText = data.shopName || "FAME POS";

            if (!data.cart || data.cart.length === 0) {
                list.innerHTML = `<div class="h-full flex items-center justify-center text-gray-300 italic text-xl">รอพนักงานเพิ่มรายการสินค้า...</div>`;
                total.innerText = "฿0.00";
                return;
            }

            total.innerText = data.total;
            list.innerHTML = data.cart.map(item => `
                <div class="flex justify-between items-center bg-red-50/50 p-6 rounded-3xl border border-red-100 animate-fadeIn">
                    <div class="flex-1">
                        <div class="text-2xl font-bold text-gray-800">${item.name}</div>
                        <div class="text-sm text-gray-400">${Object.values(item.options).join(', ')}</div>
                    </div>
                    <div class="text-right">
                        <div class="text-xl font-bold text-red-600">x${item.qty}</div>
                        <div class="text-sm font-bold text-gray-400">฿${(item.price * item.qty).toFixed(2)}</div>
                    </div>
                </div>
            `).join('');
        }

        // ดึงข้อมูลใหม่ทุกๆ 2 วินาที
        setInterval(pollUpdate, 2000);
    </script>
</body>
</html>
