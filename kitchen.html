<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="https://i.postimg.cc/7hH1kcTR/20-(2).png">
  <title>หน้าจอห้องครัว (KDS) - FamePOS</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', sans-serif; background-color: #f1f5f9; }
    .order-card { transition: transform 0.2s; }
    .order-card:hover { transform: translateY(-2px); }
    .status-new { border-left: 6px solid #ef4444; }
    .status-accepted { border-left: 6px solid #f59e0b; }
    .animate-fadeIn { animation: fadeIn 0.4s ease; }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body class="p-4 md:p-6">
  
  <div class="flex items-center gap-3">
  <img src="https://i.postimg.cc/7hH1kcTR/20-(2).png" class="w-12 h-12 rounded-xl object-cover shadow-sm border border-slate-100">
  <div>
    <h1 class="text-2xl font-bold text-slate-800 leading-tight">ระบบห้องครัว (KDS)</h1>
    <p class="text-xs text-slate-400 font-bold uppercase tracking-wider">Kitchen Display System</p>
  </div>
</div>
    <div class="flex items-center gap-4">
      <div class="flex items-center gap-2">
        <span id="conn-status" class="w-3 h-3 rounded-full bg-green-500 animate-pulse"></span>
        <span class="text-xs text-slate-500 font-bold">เชื่อมต่อแล้ว</span>
      </div>
      <div class="bg-slate-100 text-slate-600 font-bold px-4 py-2 rounded-xl text-lg tracking-widest border border-slate-200" id="clock">00:00:00</div>
    </div>
  </header>

  <div id="kitchen-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 2xl:grid-cols-4 gap-6 pb-10">
    <div class="col-span-full text-center py-20 text-slate-400 animate-pulse">กำลังซิงค์ข้อมูลออเดอร์...</div>
  </div>

  <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

  <script>
    // 🌟🌟🌟 สำคัญมาก: เอาลิงก์ Web App (ที่ลงท้ายด้วย /exec) มาวางตรงนี้ 🌟🌟🌟
    const GAS_URL = "https://script.google.com/macros/s/AKfycbze232QP-U4Z9cXDqVDZW9nnl8pmDy-NDafNWKAH6nfn14eTg4euKEjRLs6lPH1bboV_A/exec";    
    let currentOrders = [];

    // นาฬิกา
    setInterval(() => {
      document.getElementById('clock').innerText = new Date().toLocaleTimeString('th-TH');
    }, 1000);

    // ฟังก์ชันดึงข้อมูลจาก Google Sheets ผ่าน API
    function loadOrders() {
      fetch(GAS_URL + "?api=getKitchenOrders")
        .then(response => response.json())
        .then(data => {
          document.getElementById('conn-status').className = "w-3 h-3 rounded-full bg-green-500";
          
          // เล่นเสียงถ้ามีออเดอร์ใหม่เพิ่มเข้ามา
          if (data.length > currentOrders.length && currentOrders.length !== 0) {
            const sound = document.getElementById('notif-sound');
            sound.play().catch(e => console.log("รอการคลิกหน้าจอเพื่อเล่นเสียง"));
          }
          
          currentOrders = data;
          renderKitchen();
        })
        .catch(err => {
          console.error(err);
          document.getElementById('conn-status').className = "w-3 h-3 rounded-full bg-red-500";
        });
    }

    // วาดหน้าจอ
    function renderKitchen() {
      const grid = document.getElementById('kitchen-grid');
      if (currentOrders.length === 0) {
        grid.innerHTML = '<div class="col-span-full flex flex-col items-center justify-center py-32 text-slate-300"><span class="text-6xl mb-4">✨</span><h2 class="text-2xl font-bold">ครัวว่างแล้ว ยอดเยี่ยมมาก!</h2></div>';
        return;
      }

      grid.innerHTML = currentOrders.map(order => `
        <div class="order-card bg-white rounded-2xl shadow-sm overflow-hidden border border-slate-200 ${order.status === 'New' ? 'status-new' : 'status-accepted'} animate-fadeIn">
          <div class="p-4 border-b border-slate-100 flex justify-between items-center ${order.status === 'New' ? 'bg-red-50/50' : 'bg-orange-50/50'}">
            <div>
              <h3 class="text-2xl font-black text-slate-800 leading-none">โต๊ะ ${order.tableNo}</h3>
              <p class="text-[11px] text-slate-500 mt-1 font-bold">เวลาสั่ง: <span class="text-slate-700">${order.timestamp}</span></p>
            </div>
            <span class="px-3 py-1.5 rounded-lg text-[10px] font-black uppercase tracking-wider shadow-sm ${order.status === 'New' ? 'bg-red-500 text-white' : 'bg-orange-400 text-white'}">
              ${order.status === 'New' ? '🚨 ออเดอร์ใหม่' : '🍳 กำลังทำ'}
            </span>
          </div>
          
          <div class="p-5 min-h-[160px] bg-slate-50/30">
            <ul class="space-y-4">
              ${order.itemsStr.split(', ').map(item => `
                <li class="flex items-start gap-3">
                  <span class="text-blue-500 font-bold mt-1 text-lg leading-none">•</span> 
                  <span class="text-lg text-slate-700 font-bold leading-tight">${item}</span>
                </li>
              `).join('')}
            </ul>
          </div>
          
          <div class="p-4 bg-white border-t border-slate-100">
            ${order.status === 'New' 
              ? `<button onclick="updateStatus(${order.rowIndex}, 'Accepted')" class="w-full bg-orange-500 hover:bg-orange-600 text-white py-4 rounded-xl font-bold text-lg shadow-md transition active:scale-95">👨‍🍳 รับออเดอร์ (เริ่มทำ)</button>`
              : `<button onclick="updateStatus(${order.rowIndex}, 'Completed')" class="w-full bg-green-500 hover:bg-green-600 text-white py-4 rounded-xl font-bold text-lg shadow-md transition active:scale-95">✅ เสร็จแล้ว (พร้อมเสิร์ฟ)</button>`
            }
          </div>
        </div>
      `).join('');
    }

    // ฟังก์ชันส่งสถานะกลับไปที่ Google Sheets (POST Request)
    function updateStatus(rowIndex, status) {
      Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      
      fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({
          action: "updateKitchenStatus",
          rowIndex: rowIndex,
          status: status
        })
      })
      .then(response => response.json())
      .then(data => {
        Swal.close();
        if (data.success) {
          loadOrders(); // รีโหลดข้อมูลทันทีหลังกด
        } else {
          Swal.fire('Error', 'อัปเดตไม่สำเร็จ', 'error');
        }
      })
      .catch(err => {
        Swal.fire('Error', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้', 'error');
      });
    }

    // เริ่มทำงานเมื่อเปิดหน้าเว็บ
    loadOrders();
    // ดึงข้อมูลใหม่ทุกๆ 8 วินาที
    setInterval(loadOrders, 8000);
  </script>
</body>
</html>
