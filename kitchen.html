<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>หน้าจอห้องครัว (KDS) - FamePOS</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/7hH1kcTR/20-(2).png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', sans-serif; background-color: #e5e7eb; }
    .order-card { 
      background: white; 
      border-radius: 8px; 
      box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); 
      display: flex; 
      flex-direction: column;
      overflow: hidden;
      border: 1px solid #d1d5db;
    }
    /* เอฟเฟกต์ตอนออเดอร์ใหม่เข้า */
    .animate-new { animation: pulse-red 2s infinite; }
    @keyframes pulse-red {
      0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
      70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
      100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }
  </style>
</head>
<body class="p-4">
  
  <header class="flex justify-between items-center mb-6 bg-[#2d3748] p-4 rounded-lg shadow-lg border-b-4 border-red-600">
    <div class="flex items-center gap-4">
      <img src="https://i.postimg.cc/7hH1kcTR/20-(2).png" class="w-12 h-12 rounded-lg object-cover">
      <div>
        <h1 class="text-2xl font-bold text-white leading-tight">ระบบห้องครัว (KDS)</h1>
        <div class="flex items-center gap-2">
           <span id="conn-status" class="w-2 h-2 rounded-full bg-green-500"></span>
           <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Kitchen Management System</p>
        </div>
      </div>
    </div>
    <div class="text-white font-bold text-2xl tracking-tighter" id="clock">00:00:00</div>
  </header>

  <div id="kitchen-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
    <div class="col-span-full text-center py-20 text-gray-500">กำลังเชื่อมต่อข้อมูล...</div>
  </div>

  <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbze232QP-U4Z9cXDqVDZW9nnl8pmDy-NDafNWKAH6nfn14eTg4euKEjRLs6lPH1bboV_A/exec"; 
    let currentOrders = [];

    // สลับสี Header ตามลำดับ (สีน้ำเงินเข้ม, เขียวเข้ม, เทาเข้ม)
    const headerColors = ['bg-[#1a365d]', 'bg-[#065f46]', 'bg-[#4a5568]', 'bg-[#2d3748]'];

    function loadOrders() {
      fetch(GAS_URL + "?api=getKitchenOrders&_=" + new Date().getTime())
        .then(res => res.json())
        .then(data => {
          if (data.length > currentOrders.length && currentOrders.length !== 0) {
            document.getElementById('notif-sound').play().catch(e => {});
          }
          currentOrders = data;
          renderKitchen();
        });
    }

    function renderKitchen() {
      const grid = document.getElementById('kitchen-grid');
      if (currentOrders.length === 0) {
        grid.innerHTML = '<div class="col-span-full text-center py-20 text-gray-400 font-bold text-xl">ไม่มีออเดอร์ค้างทำ</div>';
        return;
      }

      grid.innerHTML = currentOrders.map((order, index) => {
        // เลือกสี Header สลับกัน
        const colorClass = headerColors[index % headerColors.length];
        const isNew = order.status === 'New';

        return `
        <div class="order-card ${isNew ? 'animate-new' : ''}">
          <div class="${colorClass} p-2 flex justify-between items-center text-white text-xs font-bold">
            <span>#ID-${order.rowIndex}</span>
            <div class="flex items-center gap-1">
              <span>🕒 ${order.timestamp}</span>
            </div>
          </div>

          <div class="bg-gray-100 p-3 text-center border-b border-gray-300">
            <h2 class="text-xl font-black text-gray-800 uppercase">TABLE NO. ${order.tableNo}</h2>
            ${isNew ? '<span class="text-[10px] text-red-600 font-black animate-pulse">🚨 ออเดอร์ใหม่</span>' : '<span class="text-[10px] text-orange-600 font-black">🍳 กำลังทำ...</span>'}
          </div>

          <div class="p-4 flex-1">
            <p class="text-[10px] font-bold text-gray-400 mb-2 uppercase border-b pb-1">รายการอาหาร (ENTREES)</p>
            <ul class="divide-y divide-gray-100">
              ${order.itemsStr.split(', ').map(item => {
                // แยกชื่ออาหารกับ Options (ถ้ามีในวงเล็บ)
                const match = item.match(/(.+) \((.+)\) (x\d+)/) || item.match(/(.+) (x\d+)/);
                if (match && match.length > 3) {
                  return `
                  <li class="py-3">
                    <div class="flex justify-between items-start">
                      <span class="text-lg font-bold text-gray-800 leading-tight">${match[1]}</span>
                      <span class="text-lg font-black text-blue-700 ml-2">${match[3]}</span>
                    </div>
                    <div class="text-xs text-red-500 font-bold mt-1 ml-2">↳ ${match[2]}</div>
                  </li>`;
                }
                return `<li class="py-3 flex justify-between items-center"><span class="text-lg font-bold text-gray-800">${item}</span></li>`;
              }).join('')}
            </ul>
          </div>

          <div class="p-3 bg-gray-50 border-t border-gray-200">
            ${isNew 
              ? `<button onclick="updateStatus(${order.rowIndex}, 'Accepted')" class="w-full bg-orange-500 hover:bg-orange-600 text-white py-3 rounded-md font-bold text-lg shadow-md transition active:scale-95 uppercase">รับออเดอร์</button>`
              : `<button onclick="updateStatus(${order.rowIndex}, 'Completed')" class="w-full bg-[#c53030] hover:bg-red-700 text-white py-3 rounded-md font-bold text-lg shadow-md transition active:scale-95 flex items-center justify-center gap-2">
                  <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                  DONE
                 </button>`
            }
          </div>
        </div>`;
      }).join('');
    }

    function updateStatus(rowIndex, status) {
      Swal.fire({ title: 'กำลังบันทึก...', allowOutsideClick: false, didOpen: () => Swal.showLoading() });
      fetch(GAS_URL, {
        method: "POST",
        body: JSON.stringify({ action: "updateKitchenStatus", rowIndex, status })
      })
      .then(res => res.json())
      .then(data => {
        Swal.close();
        if (data.success) loadOrders();
      });
    }

    setInterval(() => {
      document.getElementById('clock').innerText = new Date().toLocaleTimeString('th-TH');
    }, 1000);

    loadOrders();
    setInterval(loadOrders, 10000); // อัปเดตทุก 10 วินาที
  </script>
</body>
</html>
