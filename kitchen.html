<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KDS - FamePOS (Horizontal Mode)</title>
  <link rel="icon" type="image/png" href="https://i.postimg.cc/7hH1kcTR/20-(2).png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', sans-serif; background-color: #fff5f5; height: 100vh; overflow: hidden; }
    .horizontal-scroll { display: flex; overflow-x: auto; gap: 1.5rem; padding: 1rem; height: calc(100vh - 100px); scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; }
    .order-card { min-width: 320px; max-width: 320px; background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(255, 100, 100, 0.1); display: flex; flex-direction: column; border: 2px solid #fed7d7; scroll-snap-align: start; }
    .item-done { text-decoration: line-through !important; color: #feb2b2 !important; opacity: 0.6; }
    .horizontal-scroll::-webkit-scrollbar { height: 10px; }
    .horizontal-scroll::-webkit-scrollbar-thumb { background: #feb2b2; border-radius: 10px; }
    .animate-new { animation: pulse-warm 2s infinite; }
    @keyframes pulse-warm { 0% { box-shadow: 0 0 0 0 rgba(245, 101, 101, 0.6); } 70% { box-shadow: 0 0 0 15px rgba(245, 101, 101, 0); } 100% { box-shadow: 0 0 0 0 rgba(245, 101, 101, 0); } }
  </style>
</head>
<body class="flex flex-col">
  <header class="flex justify-between items-center bg-[#9b2c2c] p-4 shadow-lg border-b-4 border-[#ed64a6] z-10">
    <div class="flex items-center gap-4">
      <img src="https://i.postimg.cc/7hH1kcTR/20-(2).png" class="w-12 h-12 rounded-full border-2 border-pink-200">
      <div><h1 class="text-2xl font-bold text-white leading-tight">ระบบห้องครัว (KDS)</h1><p class="text-[10px] text-pink-200 font-bold uppercase tracking-widest">FamePOS Queue System</p></div>
    </div>
    <div class="text-white font-bold text-3xl" id="clock">00:00:00</div>
  </header>

  <div id="kitchen-grid" class="horizontal-scroll">
    <div class="w-full flex items-center justify-center text-pink-300">กำลังเชื่อมต่อข้อมูล...</div>
  </div>

  <audio id="notif-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbze232QP-U4Z9cXDqVDZW9nnl8pmDy-NDafNWKAH6nfn14eTg4euKEjRLs6lPH1bboV_A/exec"; 
    let currentOrders = [];
    const headerColors = ['bg-[#f6ad55]', 'bg-[#ed64a6]', 'bg-[#e53e3e]', 'bg-[#fc8181]'];

    function loadOrders() {
      fetch(GAS_URL + "?api=getKitchenOrders&_=" + new Date().getTime())
        .then(res => res.json())
        .then(data => {
          if (data.length > currentOrders.length && currentOrders.length !== 0) document.getElementById('notif-sound').play().catch(e => {});
          currentOrders = data;
          renderKitchen();
        });
    }

    function toggleItem(el) { el.classList.toggle('item-done'); }

function renderKitchen() {
  const grid = document.getElementById('kitchen-grid');
  if (currentOrders.length === 0) {
    grid.innerHTML = '<div class="w-full flex items-center justify-center text-pink-300 font-bold text-2xl">ครัวว่างแล้วจ้า 🌸</div>';
    return;
  }

  grid.innerHTML = currentOrders.map((order, index) => {
    const colorClass = headerColors[index % headerColors.length];
    const isNew = order.status === 'New';

    return `
    <div class="order-card ${isNew ? 'animate-new' : ''}">
      <div class="${colorClass} p-3 flex justify-between items-center text-white font-bold rounded-t-[18px]">
        <span class="text-lg">คิวที่ #${order.queueNo || '-'}</span>
        <span class="text-sm">🕒 ${order.timestamp}</span>
      </div>
      <div class="bg-[#fff5f5] p-3 text-center border-b border-pink-100">
        <h2 class="text-2xl font-black text-gray-800">โต๊ะ ${order.tableNo}</h2>
      </div>
      <div class="p-4 flex-1 overflow-y-auto bg-white">
        <ul class="space-y-4">
          ${order.itemsStr.split(' | ').map(item => { // 🌟 แยกรายการด้วยเครื่องหมาย |
            // ค้นหาจำนวน x1, x2 ที่อยู่ท้ายสุด
            const qtyMatch = item.match(/\s*(x\d+)$/);
            const qty = qtyMatch ? qtyMatch[1] : "";
            const remaining = item.replace(qtyMatch ? qtyMatch[0] : "", "").trim();
            
            // ค้นหาวงเล็บสุดท้ายที่เก็บตัวเลือก
            const optMatch = remaining.match(/(.+)\s*\(([^)]+)\)$/);
            
            let name = remaining;
            let opts = "";
            
            if (optMatch) {
              name = optMatch[1]; // ชื่ออาหาร
              opts = optMatch[2]; // ตัวเลือกเสริม
            }

            return `
            <li class="py-2 border-b border-pink-50 cursor-pointer" onclick="toggleItem(this)">
              <div class="flex justify-between items-start">
                <span class="text-lg font-bold text-gray-800 leading-tight">${name}</span>
                <span class="text-lg font-black text-orange-500 ml-2">${qty}</span>
              </div>
              ${opts ? `<div class="text-sm text-pink-600 font-bold mt-2 ml-1 bg-pink-50 p-2 rounded-lg flex items-start gap-1"><span>↳</span><span class="leading-relaxed">${opts}</span></div>` : ''}
            </li>`;
          }).join('')}
        </ul>
      </div>
      <div class="p-4 bg-white rounded-b-[20px]">
        ${isNew 
          ? `<button onclick="updateStatus(${order.rowIndex}, 'Accepted')" class="w-full bg-orange-400 text-white py-4 rounded-xl font-bold text-xl shadow-lg transition active:scale-95">👨‍🍳 รับออเดอร์</button>`
          : `<button onclick="updateStatus(${order.rowIndex}, 'Completed')" class="w-full bg-[#e53e3e] text-white py-4 rounded-xl font-bold text-xl shadow-lg transition active:scale-95">DONE</button>`
        }
      </div>
    </div>`;
  }).join('');
}

    function updateStatus(rowIndex, status) {
      Swal.fire({ title: 'บันทึกสถานะ...', didOpen: () => Swal.showLoading() });
      fetch(GAS_URL, { method: "POST", body: JSON.stringify({ action: "updateKitchenStatus", rowIndex, status }) })
      .then(res => res.json()).then(data => { Swal.close(); if (data.success) loadOrders(); });
    }

    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('th-TH'); }, 1000);
    loadOrders();
    setInterval(loadOrders, 6000);
  </script>
</body>
</html>
