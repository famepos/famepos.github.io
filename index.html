<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>FamePos - ระบบขายหน้าร้าน</title>
  
  <link rel="icon" type="image/png" href="https://i.postimg.cc/SxGCt9N2/logo.png">
  <link rel="apple-touch-icon" href="https://i.postimg.cc/SxGCt9N2/logo.png">
  <meta name="apple-mobile-web-app-title" content="FamePOS">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

  <style>
    /* 🌟 จัดการพื้นฐานหน้าเว็บ */
    body, html { 
      margin: 0; 
      padding: 0; 
      height: 100%; 
      width: 100%;
      overflow: hidden; 
      background-color: #000; 
      font-family: sans-serif;
    }

    /* 🌟 สไตล์ของ Splash Screen */
    #splash-screen {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.5s ease-out;
    }

    .splash-container {
      text-align: center;
      animation: fade 1.2s ease-in-out;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .app-logo {
      width: 120px;
      height: 120px;
      object-fit: contain;
      margin-bottom: 20px;
      border-radius: 25px;
      box-shadow: 0 10px 25px rgba(255, 77, 77, 0.3);
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 28px;
      letter-spacing: 2px;
      font-weight: bold;
      color: white;
    }

    p {
      margin: 0;
      color: #aaaaaa;
      font-size: 14px;
      font-style: italic;
    }

    /* 🌟 สไตล์ของ iframe (ซ่อนไว้ก่อนโหลดเสร็จ) */
    #app-frame {
      width: 100%;
      height: 100%;
      border: none;
      display: none;
    }

    @keyframes fade {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>

  <script>
    function startApp() {
      // 1. ตั้งค่าแสดง iframe
      const frame = document.getElementById('app-frame');
      frame.style.display = 'block';
      
      // 2. ค่อยๆ ซ่อนหน้า Splash Screen
      const splash = document.getElementById('splash-screen');
      splash.style.opacity = '0';
      
      // 3. ลบหน้า Splash ออกจากระบบหลังจางหายไปแล้ว
      setTimeout(() => {
        splash.remove();
        document.body.style.backgroundColor = '#fce4e4'; // เปลี่ยนสีพื้นหลังตามแอป
      }, 500);
    }

    // เริ่มทำงานหลังจาก 1.5 วินาที (เพื่อให้เห็นอนิเมชั่น)
    setTimeout(startApp, 1500);
  </script>
</head>
<body>

  <div id="splash-screen">
    <div class="splash-container">
      <img src="https://i.postimg.cc/SxGCt9N2/logo.png" alt="FamePOS Logo" class="app-logo">
      <h1>FamePOS</h1>
      <p>กำลังเข้าสู่ระบบ...</p>
    </div>
  </div>

  <iframe 
    id="app-frame" 
    src="https://script.google.com/macros/s/AKfycbys1ZE_I3pZxjVTfhWo14p1vEqKLB5wQeTawHy3FsepovnugTQo9wqZskrS9Iri70gT/exec"
    allow="camera *; microphone *; display-capture *; autoplay *;">
  </iframe>

</body>
</html>
