<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FamePOS Customer Display</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background: #fce4e4; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="h-screen flex flex-col p-4 md:p-8">
    <div class="flex flex-1 gap-6 overflow-hidden">
        <div class="flex-[2] bg-white rounded-[2rem] shadow-2xl flex flex-col overflow-hidden border border-red-100">
            <div class="bg-red-500 p-6 flex justify-between items-center text-white">
                <h2 class="text-2xl font-bold flex items-center gap-2">🛒 รายการสินค้า</h2>
                <img src="https://i.postimg.cc/SxGCt9N2/logo.png" class="h-10 rounded-lg border-2 border-white shadow-sm">
            </div>
            <div id="display-items" class="flex-1 overflow-y-auto p-6 space-y-4">
                <div class="h-full flex flex-col items-center justify-center text-gray-300">
                    <span class="text-8xl">🏪</span>
                    <p class="text-xl mt-4 font-bold">ยินดีต้อนรับสู่ FamePOS</p>
                </div>
            </div>
        </div>

        <div class="flex-1 flex flex-col gap-6">
            <div class="bg-white p-8 rounded-[2rem] shadow-2xl text-center border-b-[10px] border-red-500">
                <p class="text-gray-400 font-bold uppercase tracking-widest text-sm mb-2">ยอดที่ต้องชำระ</p>
                <h1 id="display-total" class="text-7xl font-black text-red-600">฿0.00</h1>
            </div>

            <div id="payment-status-area" class="flex-1 bg-white rounded-[2rem] shadow-2xl p-8 flex flex-col items-center justify-center border-2 border-dashed border-gray-100 relative">
                <div id="view-idle" class="text-center text-gray-400">
                    <p class="text-lg">ขอบคุณที่ใช้บริการ</p>
                </div>

                <div id="view-qr" class="hidden text-center fade-in">
                    <p class="font-bold text-red-700 mb-4 text-xl">สแกนจ่ายผ่านพร้อมเพย์</p>
                    <img id="qr-display-img" src="" class="w-64 h-64 mx-auto rounded-2xl shadow-lg border-4 border-red-50">
                </div>

                <div id="view-cash" class="hidden w-full space-y-8 fade-in text-center">
                    <div>
                        <p class="text-gray-400 font-bold uppercase text-xs">รับเงินมา</p>
                        <p id="cash-received" class="text-4xl font-bold text-gray-800">฿0.00</p>
                    </div>
                    <div class="bg-green-50 p-6 rounded-3xl border-2 border-green-200">
                        <p class="text-green-600 font-bold uppercase text-xs">เงินทอน</p>
                        <p id="cash-change" class="text-6xl font-black text-green-600">฿0.00</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // รับข้อมูลจากหน้า POS หลัก
        window.addEventListener('message', function(event) {
            const data = event.data;
            if (!data || data.type !== 'UPDATE_CDS') return;

            const itemsDiv = document.getElementById('display-items');
            const totalH1 = document.getElementById('display-total');
            const qrImg = document.getElementById('qr-display-img');
            const cashReceived = document.getElementById('cash-received');
            const cashChange = document.getElementById('cash-change');

            // 1. อัปเดตรายการสินค้า
            if (data.cart.length > 0) {
                itemsDiv.innerHTML = data.cart.map(i => `
                    <div class="flex justify-between items-center bg-gray-50 p-4 rounded-2xl fade-in">
                        <div>
                            <p class="font-bold text-gray-800">${i.name}</p>
                            <p class="text-xs text-gray-400">${Object.values(i.options).join(', ')}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-bold text-gray-700">x ${i.qty}</p>
                            <p class="text-red-500 font-bold">฿${(i.price * i.qty).toFixed(2)}</p>
                        </div>
                    </div>
                `).join('');
            } else {
                itemsDiv.innerHTML = '<div class="h-full flex flex-col items-center justify-center text-gray-300"><span class="text-8xl">🏪</span><p class="text-xl mt-4 font-bold">ขอบคุณที่ใช้บริการ</p></div>';
            }

            // 2. อัปเดตยอดรวม
            totalH1.innerText = "฿" + parseFloat(data.total).toFixed(2);

            // 3. จัดการการแสดงผลจ่ายเงิน
            document.getElementById('view-idle').classList.add('hidden');
            document.getElementById('view-qr').classList.add('hidden');
            document.getElementById('view-cash').classList.add('hidden');

            if (data.status === 'QR_PAYING') {
                qrImg.src = data.qrUrl;
                document.getElementById('view-qr').classList.remove('hidden');
            } else if (data.status === 'CASH_PAYING') {
                cashReceived.innerText = "฿" + parseFloat(data.received).toLocaleString();
                cashChange.innerText = "฿" + parseFloat(data.change).toFixed(2);
                document.getElementById('view-cash').classList.remove('hidden');
            } else {
                document.getElementById('view-idle').classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
