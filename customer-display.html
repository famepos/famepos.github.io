<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FamePOS - Customer Display</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #fce4e4; }
        .fade-in { animation: fadeIn 0.3s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">
    <div class="bg-white p-6 shadow-md flex justify-between items-center">
        <img src="https://i.postimg.cc/SxGCt9N2/logo.png" class="h-16 w-auto object-contain rounded-xl">
        <div class="text-right">
            <h1 class="text-2xl font-bold text-gray-800">ยินดีต้อนรับ</h1>
            <p class="text-red-500 font-bold" id="display-status">Welcome to FamePOS</p>
        </div>
    </div>

    <div class="flex flex-1 overflow-hidden p-6 gap-6">
        <div class="flex-[2] bg-white rounded-3xl shadow-xl flex flex-col overflow-hidden">
            <div class="bg-gray-50 p-4 border-b font-bold text-gray-600 flex justify-between">
                <span>รายการสินค้า</span>
                <span>จำนวน</span>
            </div>
            <div id="cart-list" class="flex-1 overflow-y-auto p-4 space-y-4">
                <div class="h-full flex flex-col items-center justify-center text-gray-300 italic">
                    <span class="text-6xl mb-4">🛒</span>
                    <p>รอเลือกรายการสินค้า...</p>
                </div>
            </div>
        </div>

        <div class="flex-1 flex flex-col gap-6">
            <div class="bg-white p-8 rounded-3xl shadow-xl text-center border-t-8 border-red-500">
                <p class="text-gray-400 font-bold uppercase tracking-wider mb-2">ยอดชำระทั้งหมด</p>
                <h2 class="text-6xl font-black text-red-600" id="total-amount">฿0.00</h2>
            </div>

            <div id="payment-area" class="flex-1 bg-white rounded-3xl shadow-xl p-6 flex flex-col items-center justify-center border-2 border-dashed border-gray-200">
                <div id="idle-view" class="text-center">
                    <p class="text-gray-400">กรุณาตรวจสอบรายการสินค้า</p>
                </div>

                <div id="qr-view" class="hidden text-center fade-in">
                    <p class="font-bold text-gray-700 mb-4">สแกนเพื่อชำระเงิน</p>
                    <img id="qr-img" src="" class="w-64 h-64 mx-auto mb-4 border-4 border-red-50 rounded-2xl">
                    <p class="text-sm text-red-500 font-bold">พร้อมเพย์</p>
                </div>

                <div id="cash-view" class="hidden w-full space-y-6 fade-in">
                    <div class="text-center border-b pb-4">
                        <p class="text-gray-400 text-sm font-bold uppercase">รับเงินมา</p>
                        <p class="text-4xl font-bold text-gray-800" id="received-amount">฿0.00</p>
                    </div>
                    <div class="text-center">
                        <p class="text-gray-400 text-sm font-bold uppercase">เงินทอน</p>
                        <p class="text-5xl font-black text-green-500" id="change-amount">฿0.00</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ฟังก์ชันอัปเดตหน้าจอจาก LocalStorage
        window.addEventListener('storage', (e) => {
            if (e.key === 'famepos_cds_data') {
                updateDisplay(JSON.parse(e.newValue));
            }
        });

        function updateDisplay(data) {
            const cartList = document.getElementById('cart-list');
            const totalDisplay = document.getElementById('total-amount');
            const statusText = document.getElementById('display-status');

            // 1. อัปเดตรายการสินค้า
            if (data.cart && data.cart.length > 0) {
                cartList.innerHTML = data.cart.map(item => `
                    <div class="flex justify-between items-center p-4 bg-red-50/50 rounded-2xl fade-in">
                        <div>
                            <p class="font-bold text-lg text-gray-800">${item.name}</p>
                            <p class="text-xs text-gray-400">${Object.values(item.options).join(', ')}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-bold text-gray-700">x ${item.qty}</p>
                            <p class="text-red-500 font-bold">฿${(item.price * item.qty).toFixed(2)}</p>
                        </div>
                    </div>
                `).join('');
            } else {
                cartList.innerHTML = `<div class="h-full flex flex-col items-center justify-center text-gray-300 italic"><span class="text-6xl mb-4">🛒</span><p>รอเลือกรายการสินค้า...</p></div>`;
            }

            // 2. อัปเดตยอดรวม
            totalDisplay.innerText = `฿${parseFloat(data.finalTotal || 0).toFixed(2)}`;

            // 3. จัดการสถานะการชำระเงิน
            const idleView = document.getElementById('idle-view');
            const qrView = document.getElementById('qr-view');
            const cashView = document.getElementById('cash-view');

            [idleView, qrView, cashView].forEach(v => v.classList.add('hidden'));

            if (data.status === 'paying_qr') {
                statusText.innerText = "กำลังชำระเงินด้วย QR Code";
                document.getElementById('qr-img').src = data.qrUrl;
                qrView.classList.remove('hidden');
            } else if (data.status === 'paying_cash') {
                statusText.innerText = "กำลังชำระเงินสด";
                document.getElementById('received-amount').innerText = `฿${parseFloat(data.received || 0).toLocaleString()}`;
                document.getElementById('change-amount').innerText = `฿${parseFloat(data.change || 0).toFixed(2)}`;
                cashView.classList.remove('hidden');
            } else {
                statusText.innerText = "FamePOS - พร้อมให้บริการ";
                idleView.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
